<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" font-family="Arial, sans-serif">
  <title>Hulusi family overview — concept (placeholder)</title>
  <defs>
    <linearGradient id="walnut2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8b5a2b"/>
      <stop offset="100%" stop-color="#5a3818"/>
    </linearGradient>
    <linearGradient id="pakka2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7a5230"/>
      <stop offset="100%" stop-color="#4d3320"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="400" fill="#fff8ec"/>

  <text x="500" y="30" text-anchor="middle" font-size="18" font-weight="bold">Hulusi family — B♭ / C / D / F / G</text>

  <!-- 5 instruments side by side, scaled by family-sheet pipe lengths -->
  <g transform="translate(120, 60)">
    <ellipse cx="0" cy="40" rx="32" ry="40" fill="url(#walnut2)"/>
    <rect x="-10" y="80" width="20" height="268" fill="url(#pakka2)"/>
    <text x="0" y="-10" text-anchor="middle" font-size="13" font-weight="bold">B♭</text>
    <text x="0" y="368" text-anchor="middle" font-size="10" fill="#555">14.89 in</text>
  </g>

  <g transform="translate(290, 60)">
    <ellipse cx="0" cy="40" rx="32" ry="40" fill="url(#walnut2)"/>
    <rect x="-10" y="80" width="20" height="240" fill="url(#pakka2)"/>
    <text x="0" y="-10" text-anchor="middle" font-size="13" font-weight="bold">C</text>
    <text x="0" y="340" text-anchor="middle" font-size="10" fill="#555">13.30 in</text>
  </g>

  <g transform="translate(460, 60)">
    <ellipse cx="0" cy="40" rx="32" ry="40" fill="url(#walnut2)"/>
    <rect x="-10" y="80" width="20" height="214" fill="url(#pakka2)"/>
    <text x="0" y="-10" text-anchor="middle" font-size="13" font-weight="bold">D</text>
    <text x="0" y="314" text-anchor="middle" font-size="10" fill="#555">11.89 in</text>
  </g>

  <g transform="translate(630, 60)">
    <ellipse cx="0" cy="40" rx="32" ry="40" fill="#bf9000" stroke="#7a5e00" stroke-width="2"/>
    <rect x="-10" y="80" width="20" height="181" fill="url(#pakka2)" stroke="#7a5e00" stroke-width="1"/>
    <text x="0" y="-10" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a5e00">F ★</text>
    <text x="0" y="281" text-anchor="middle" font-size="10" fill="#555">10.05 in</text>
  </g>

  <g transform="translate(800, 60)">
    <ellipse cx="0" cy="40" rx="32" ry="40" fill="url(#walnut2)"/>
    <rect x="-10" y="80" width="20" height="161" fill="url(#pakka2)"/>
    <text x="0" y="-10" text-anchor="middle" font-size="13" font-weight="bold">G</text>
    <text x="0" y="261" text-anchor="middle" font-size="10" fill="#555">8.99 in</text>
  </g>

  <text x="500" y="385" text-anchor="middle" font-size="11" fill="#777" font-style="italic">★ F-key = standard prototype 1.   Concept render — replace with photo set after HUL-P4.</text>
</svg>
